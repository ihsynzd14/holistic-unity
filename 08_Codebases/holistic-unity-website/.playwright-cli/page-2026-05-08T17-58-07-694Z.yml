      - heading "What is ThetaHealing®?" [level=2] [ref=e27]
      - paragraph [ref=e28]: ThetaHealing® is a meditation and energy work technique developed by Vianna Stibal in 1995. It is based on the principle that the theta brainwave state — the same slow frequency experienced just before sleep — allows access to the subconscious mind, where deep-rooted beliefs, patterns, and programmes are stored.
      - paragraph [ref=e29]: "In a ThetaHealing® session, a certified practitioner enters a meditative theta state and works with the client to identify and transform limiting beliefs at four levels: core, genetic, history, and soul. Unlike many approaches that require years of talk therapy, ThetaHealing® works directly at the level of belief — facilitating shifts that many clients describe as immediate and profound."
      - paragraph [ref=e30]: The technique incorporates muscle testing (applied kinesiology) to identify what the body believes at a subconscious level, and the 'Belief Work' process to replace limiting programmes with more expansive, supportive ones. It is used by practitioners globally to support clients in areas including self-worth, relationships, abundance, purpose, trauma, and fear.
